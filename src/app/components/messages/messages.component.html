@if (messageService.messageCounter() !== 0) {
<div>
  <h2>Messages</h2>
  <p>Count: {{ messageService.messageCounter() }}</p>
  <button type="button" class="clear" (click)="messageService.clear()">
    Clear messages
  </button>
  @for (message of messageService.messages(); track message) {
  <div>{{ message }}</div>
  }
</div>
}
